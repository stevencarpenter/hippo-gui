excluded:
  - .swiftpm
  - dist
  - scripts

disabled_rules:
  - trailing_whitespace  # swift-format handles whitespace
  - trailing_comma       # swift-format owns trailing commas via multiElementCollectionTrailingCommas

opt_in_rules:
  - empty_count
  - closure_spacing
  - contains_over_filter_count
  - first_where
  - sorted_first_last

line_length:
  warning: 140
  error: 200

file_length:
  warning: 600
  error: 1000

function_body_length:
  warning: 60
  error: 100

type_body_length:
  warning: 350
  error: 500

identifier_name:
  # Short fixture names are idiomatic in unit tests (system-under-test,
  # numbered nodes/events/sessions). Allow them rather than padding names.
  excluded:
    - vm
    - n1
    - n2
    - e1
    - e2
    - s1
    - s2
    - id
